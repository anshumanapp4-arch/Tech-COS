# AuraOS Render Blueprint Specification
# Use this blueprint to deploy the complete stack (Database, Backend, Frontend) with one click.
# NOTE: If you get a subdomain conflict error during sync, change the 'name' of the services below
# (e.g., to 'auraos-backend-yourname' and 'auraos-frontend-yourname') to get a unique URL.

services:
  # ---------------------------------------------------------------------------
  # 1. Dockerized FastAPI Backend
  # ---------------------------------------------------------------------------
  - type: web
    name: auraos-backend-anshuman
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    envVars:
      # Will fall back to SQLite if not provided manually in Render Dashboard
      - key: DATABASE_URL
        sync: false

      # Automatically injected frontend URL for CORS middleware
      - key: FRONTEND_URL
        fromService:
          type: web
          name: auraos-frontend-anshuman
          property: host

      # Secrets automatically configured by Blueprint
      - key: PINECONE_API_KEY
        value: base64:cGNza182OFZjMkdfVXRueGNVUE1lTVN3NHpSU1U0VUwxbXd4RkdLRDl5aHZTcFZKSnd4OU5UOVE2YXJpVTdMc0RReXhwb01nS01a
      - key: GEMINI_API_KEY
        value: base64:QVEuQWI4Uk42SkIwMlpsTGZocHhYVXE5anhrWVpNTUlCblcwWmFqY0RsSXhNWUdrNE5mQWc=
      - key: SARVAM_API_KEY
        value: base64:c2tfYXJ4azFoa3JfZDQ2U1JMMHVmT2pWUXJncWZ6RUhFUldF
      - key: PINECONE_INDEX_NAME
        value: auraos

      # Automatically generated secure token secret
      - key: JWT_SECRET
        generateValue: true

  # ---------------------------------------------------------------------------
  # 2. Next.js Frontend
  # ---------------------------------------------------------------------------
  - type: web
    name: auraos-frontend-anshuman
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      # Automatically injected backend URL for client-side API requests
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: auraos-backend-anshuman
          property: host
