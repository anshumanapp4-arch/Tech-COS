services:
  - type: web
    name: auraos-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: auraos-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false

databases:
  - name: auraos-db
    databaseName: auraos
    user: auraos_admin
